# trust_level 可选： trusted | untrusted

# =========================
# 其他可选分区（按 schema 支持，按需新增）
# =========================
# 静态分区：
# - [agents]：max_threads / max_depth / job_max_runtime_seconds / [agents.explorer]
# - [analytics]：enabled
# - [feedback]：enabled
# - [history]：persistence = "save-all"|"none"，可配 max_bytes
# - [ghost_snapshot]：disable_warnings / ignore_large_untracked_dirs / ignore_large_untracked_files
# - [sandbox_workspace_write]：network_access / writable_roots / exclude_slash_tmp / exclude_tmpdir_env_var
# - [shell_environment_policy]：inherit / include_only / exclude / ignore_default_excludes /
#   experimental_use_profile；其子表 [shell_environment_policy.set] 可强制设置环境变量
# - [tools]：view_image；其子表 [tools.web_search] 可配 allowed_domains / context_size /
#   [tools.web_search.location] { city, region, country, timezone }
# - [audio]：microphone / speaker
# - [memories]：extract_model / consolidation_model / use_memories / generate_memories /
#   no_memories_if_mcp_or_web_search / min_rollout_idle_hours / max_rollout_age_days /
#   max_unused_days / max_rollouts_per_startup / max_raw_memories_for_consolidation
# - [windows]：sandbox / sandbox_private_desktop
# - [realtime]：type = "conversation"|"transcription"，version = "v1"|"v2"（实验性）
#
# 动态分区：
# - [permissions.<name>.network] / [permissions.<name>.filesystem]
# - [model_providers.<name>]
# - [profiles.<name>]
# - [plugins."<name>"]
# - [apps._default] / [apps."<app_id>"] / [apps."<app_id>".tools."<tool_name>"]
# - [skills.bundled] / [[skills.config]]
