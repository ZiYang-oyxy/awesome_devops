#:schema https://developers.openai.com/codex/config-schema.json
# Codex portable config
#
# Latest schema pulled on 2026-06-13:
# - ~/.codex/config.schema.json
# - https://developers.openai.com/codex/config-schema.json
#
# Keep this file free of machine-local paths, per-host credentials, and
# project-specific trust entries. Put those in ~/.codex/local.config.toml and
# start Codex with: codex --profile local

# -------------------------
# Model / provider
# -------------------------
model = "gpt-5.5"
review_model = "gpt-5.5"
model_provider = "openai-http"
disable_response_storage = true

model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"
web_search = "live"
personality = "pragmatic"

# -------------------------
# Startup / auth / execution
# -------------------------
check_for_update_on_startup = true
hide_agent_reasoning = false
show_raw_agent_reasoning = false
suppress_unstable_features_warning = true

# Common optional knobs:
# approval_policy = "on-request"
# approvals_reviewer = "user"
# sandbox_mode = "workspace-write"
# default_permissions = "default"
# cli_auth_credentials_store = "auto"
# mcp_oauth_credentials_store = "auto"
# file_opener = "vscode"

# -------------------------
# UI
# -------------------------
notify = ["/Users/bytedance/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[tui]
status_line = [
  "model-with-reasoning",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "used-tokens",
  "context-window-size",
  "current-dir",
  "task-progress",
]
notifications = true
alternate_screen = "auto"
animations = true
terminal_title = ["activity", "project-name", "task-progress", "run-state"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

# -------------------------
# Tools
# -------------------------
[tools]
view_image = true

[tools.web_search]
context_size = "medium"

[tools.web_search.location]
city = "Shanghai"
region = "Shanghai"
country = "CN"
timezone = "Asia/Shanghai"

# -------------------------
# Telemetry / history
# -------------------------
[otel]
environment = "dev"
exporter = "none"
metrics_exporter = "none"
trace_exporter = "none"
log_user_prompt = false

[history]
persistence = "save-all"
max_bytes = 104857600

[notice]
hide_rate_limit_model_nudge = true

# -------------------------
# Agents
# -------------------------
[agents]
max_depth = 4
job_max_runtime_seconds = 1800

# Role config files are intentionally not listed here because they are
# machine-local in the current setup. Add them in local.config.toml.

# -------------------------
# Feature flags
# -------------------------
[features]
hooks = true
multi_agent = true
apply_patch_freeform = true
apps = true
child_agents_md = false
code_mode = true
default_mode_request_user_input = true
enable_fanout = false
enable_request_compression = true
fast_mode = true
memories = false
multi_agent_v2 = false
personality = true
plugins = true
prevent_idle_sleep = true
realtime_conversation = true
runtime_metrics = true
shell_snapshot = true
shell_tool = true
skill_mcp_dependency_install = true
tool_search = true
tool_suggest = true
unified_exec = true
js_repl = false

# -------------------------
# Model providers
# -------------------------
[model_providers.openai-cch]
name = "CCH OpenAI Compatible HTTP"
base_url = "https://oyxy.top:9443/v1"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
supports_websockets = false
requires_openai_auth = false

[model_providers.openai-http]
name = "OpenAI Compatible HTTP"
base_url = "https://oyxy.top:999"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
supports_websockets = false
requires_openai_auth = false

[model_providers.openai-ws]
name = "OpenAI Websocket"
base_url = "https://oyxy.top:999"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
supports_websockets = true
requires_openai_auth = true

# -------------------------
# Portable plugin preferences
# -------------------------
[plugins."superpowers@openai-curated"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."build-web-data-visualization@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[projects."/Volumes/code/test4"]
trust_level = "trusted"

[marketplaces.openai-bundled]
last_updated = "2026-06-13T09:49:45Z"
source_type = "local"
source = "/Users/bytedance/.codex/.tmp/bundled-marketplaces/openai-bundled"

