# Codex 配置（按 schema 整理版）
# 参考：
# - 最新schema: https://developers.openai.com/codex/config-schema.json （已按 2026-03-27 拉取核对）
# - 官方文档: https://developers.openai.com/codex/config-reference
#
# 使用约定：
# - 顶层键必须全部放在第一个实际 table 之前。
# - 每个真实分区只保留一份，避免“前面已生效，后面又写一套示例”的重复。
# - 动态分区（如 [mcp_servers.<name>] / [projects."<absolute_path>"]）只保留简洁说明，
#   不再重复放整段可取消注释模板，避免 TOML 作用域误伤。

# =========================
# 顶层：提示词 / 模型 / 提供方
# =========================
# instructions = "System instructions"
# compact_prompt = "Compact prompt text"

model = "gpt-5.4"
model_provider = "openai-http"
model_reasoning_effort = "medium"      # none|minimal|low|medium|high|xhigh
plan_mode_reasoning_effort = "xhigh"    # none|minimal|low|medium|high|xhigh
model_reasoning_summary = "auto"       # auto|concise|detailed|none
model_verbosity = "medium"             # low|medium|high
web_search = "live"                    # disabled|cached|live
personality = "pragmatic"              # none|friendly|pragmatic

# review_model = "gpt-5"
review_model = "gpt-5.4"
# model_provider = "openai"            # 对应 [model_providers.<name>] 的 key
# oss_provider = "ollama"
# model_context_window = 200000
# model_auto_compact_token_limit = 120000
# GPT-5.4 可实验性尝试 1M 上下文；默认保持注释，按需手动打开。
# 注意：超过标准 272K 的部分通常会按更高额度/成本计入，且长上下文会增加延迟。
# model_context_window = 1000000
# model_auto_compact_token_limit = 800000
# model_supports_reasoning_summaries = true
# model_instructions_file = "/abs/path/instructions.md"
# model_catalog_json = "/abs/path/model-catalog.json"
# openai_base_url = "https://api.openai.com/v1" # 仅覆盖内建 openai provider 的 base URL

# =========================
# 顶层：认证 / 执行策略 / 通知
# =========================
notify = ["sh", "-c", "exec tmux-statusctl notify-done \"$@\"", "notify", "notify-done"]
check_for_update_on_startup = true
hide_agent_reasoning = false
show_raw_agent_reasoning = true
suppress_unstable_features_warning = true

