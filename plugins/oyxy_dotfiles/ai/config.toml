# max_unused_days = 30                 # integer，记忆未使用淘汰阈值（天）
# max_rollouts_per_startup = 200       # integer，单次启动最多处理 rollout 数
# max_raw_memories_for_consolidation = 200    # integer，全局汇总保留的原始记忆数


