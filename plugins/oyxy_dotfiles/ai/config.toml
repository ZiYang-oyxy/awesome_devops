# =========================
# [tui]
# =========================
[tui]
status_line = ["model-with-reasoning", "fast-mode", "context-remaining", "five-hour-limit", "weekly-limit", "used-tokens", "context-window-size", "current-dir"]
notifications = true
alternate_screen = "never"             # auto|always|never
animations = true
terminal_title = ["project", "task-progress", "status"]
# notification_method = "auto"         # auto|osc9|bel
# show_tooltips = true
# theme = "one-dark-pro"
# 可选子表： [tui.model_availability_nux]
# 例： "gpt-5.4" = 1

# =========================
# [tools]
# =========================
[tools]
view_image = true
[tools.web_search]
context_size = "high"             # low|medium|high
[tools.web_search.location]
city = "Shanghai"
region = "Shanghai"
country = "CN"
timezone = "Asia/Shanghai"

# =========================
# [mcp_servers.<name>]
# =========================
# 新增 server 时，请完整新增一个 [mcp_servers.<name>] 区块。
# 常用键：command/url、args、cwd、enabled、required、startup_timeout_ms|sec、
# tool_timeout_sec、env_vars、scopes、enabled_tools、disabled_tools、
# bearer_token(_env_var)、oauth_resource，以及
# [mcp_servers.<name>.env] / [mcp_servers.<name>.http_headers] /
# [mcp_servers.<name>.env_http_headers]。

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"
enabled = false
required = false
startup_timeout_sec = 3.0

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
enabled = false
required = false
startup_timeout_sec = 6.0

# =========================
# [otel]
# =========================
[otel]
environment = "dev"
exporter = "none"                      # none|statsig
metrics_exporter = "none"              # none|statsig
trace_exporter = "none"                # none|statsig
log_user_prompt = false

# =========================
# history
# =========================
[history]
persistence = "save-all"             # save-all|none
max_bytes = 104857600

# =========================
# [analytics] / [feedback]
# =========================
# [analytics]
# enabled = true
#
# [feedback]
# enabled = true

# =========================
# [agents]
# =========================
[agents]
max_threads = 12
max_depth = 4
job_max_runtime_seconds = 1800

[agents.default]
description = "通用型子代理，承接未显式指定 agent_type 的默认委派任务。"
config_file = "/Volumes/code/awesome_devops/plugins/oyxy_dotfiles/ai/default.toml"

[agents.explorer]
description = "探索型子代理，适合代码库定位、查找、归纳和并行调研。"
config_file = "/Volumes/code/awesome_devops/plugins/oyxy_dotfiles/ai/explorer.toml"

[agents.worker]
description = "执行型子代理，适合代码修改、修复、实现和明确 ownership 的子任务。"
config_file = "/Volumes/code/awesome_devops/plugins/oyxy_dotfiles/ai/worker.toml"

# =========================
# [apps] / [skills] / [audio] / [realtime]
