# Codex 配置（按 schema 整理版）
# 参考：
# - 最新schema: https://developers.openai.com/codex/config-schema.json
# - 官方文档: https://developers.openai.com/codex/config-reference
#
# 使用约定：
# - 顶层键必须全部放在第一个实际 table 之前。
# - 每个真实分区只保留一份，避免“前面已生效，后面又写一套示例”的重复。
# - 动态分区（如 [mcp_servers.<name>] / [projects."<absolute_path>"]）只保留简洁说明，
#   不再重复放整段可取消注释模板，避免 TOML 作用域误伤。

# =========================
# 顶层：提示词 / 模型 / 提供方
# =========================
# instructions = "System instructions"
# developer_instructions = "Developer instructions"
# compact_prompt = "Compact prompt text"

model = "gpt-5.4"
service_tier = "fast"                  # fast|flex
model_reasoning_effort = "medium"      # none|minimal|low|medium|high|xhigh
plan_mode_reasoning_effort = "high"    # none|minimal|low|medium|high|xhigh
model_reasoning_summary = "auto"       # auto|concise|detailed|none
model_verbosity = "medium"             # low|medium|high
web_search = "live"                    # disabled|cached|live
personality = "pragmatic"              # none|friendly|pragmatic

# review_model = "gpt-5"
# model_provider = "openai"            # 对应 [model_providers.<name>] 的 key
# oss_provider = "ollama"
# model_context_window = 200000
# model_auto_compact_token_limit = 120000
# model_supports_reasoning_summaries = true
# model_instructions_file = "/abs/path/instructions.md"
# model_catalog_json = "/abs/path/model-catalog.json"

# =========================
# 顶层：认证 / 执行策略 / 通知
# =========================
notify = ["sh", "-c", "exec \"$HOME/.config/tmux/tmux_status_hook.sh\" \"$@\"", "notify", "notify-done"]
check_for_update_on_startup = true
hide_agent_reasoning = false
show_raw_agent_reasoning = true
suppress_unstable_features_warning = true

# forced_login_method = "chatgpt"      # chatgpt|api
# forced_chatgpt_workspace_id = "workspace_xxx"
# cli_auth_credentials_store = "auto"  # file|keyring|auto|ephemeral
# mcp_oauth_credentials_store = "auto" # auto|file|keyring
# mcp_oauth_callback_port = 1455
# mcp_oauth_callback_url = "http://127.0.0.1:1455/callback"

# approval_policy = "on-request"       # untrusted|on-failure|on-request|never
# approval_policy = { reject = { mcp_elicitations = true, rules = false, sandbox_approval = false, request_permissions = false } }
# approvals_reviewer = "user"          # user|guardian_subagent
# sandbox_mode = "workspace-write"     # read-only|workspace-write|danger-full-access
# allow_login_shell = true
# background_terminal_max_timeout = 300000
# default_permissions = "default"
# file_opener = "vscode"               # vscode|vscode-insiders|windsurf|cursor|none

# commit_attribution = "Co-authored-by: Your Name <you@example.com>"
# disable_paste_burst = false
# experimental_use_freeform_apply_patch = true
# experimental_use_unified_exec_tool = true
# experimental_compact_prompt_file = "/abs/path/compact-prompt.md"
# experimental_realtime_start_instructions = "..."
# experimental_realtime_ws_backend_prompt = "..."
# experimental_realtime_ws_base_url = "wss://..."
# experimental_realtime_ws_model = "..."
# experimental_realtime_ws_startup_context = "..."

# =========================
# 顶层：路径 / 文档 / 预算
# =========================
# log_dir = "/abs/path/logs"
# sqlite_home = "/abs/path/codex-state"
# project_doc_fallback_filenames = ["AGENTS.md", "README.md"]
# project_doc_max_bytes = 65536
# project_root_markers = [".git", ".hg"]
# profile = "default"
# tool_output_token_limit = 12000
# chatgpt_base_url = "https://chatgpt.com"
# js_repl_node_path = "/abs/path/node"
# js_repl_node_module_dirs = ["/abs/path/node_modules"]
# zsh_path = "/abs/path/zsh"
# windows_wsl_setup_acknowledged = true

# =========================
# [tui]
# =========================
[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "total-input-tokens",
  "total-output-tokens",
  "five-hour-limit",
  "weekly-limit",
  "fast-mode",
]
notifications = true
alternate_screen = "never"             # auto|always|never
animations = true
# notification_method = "auto"         # auto|osc9|bel
# show_tooltips = true
# theme = "one-dark-pro"
# 可选子表： [tui.model_availability_nux]
# 例： "gpt-5.4" = 1

# =========================
# [mcp_servers.<name>]
# =========================
# 新增 server 时，请完整新增一个 [mcp_servers.<name>] 区块。
# 常用键：command/url、args、cwd、enabled、required、startup_timeout_ms|sec、
# tool_timeout_sec、env_vars、scopes、enabled_tools、disabled_tools、
# bearer_token(_env_var)、oauth_resource，以及
# [mcp_servers.<name>.env] / [mcp_servers.<name>.http_headers] /
# [mcp_servers.<name>.env_http_headers]。

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"
enabled = true
required = false
startup_timeout_sec = 3.0

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
enabled = true
required = false
startup_timeout_sec = 6.0

# =========================
# [otel]
# =========================
[otel]
environment = "dev"
exporter = "none"                      # none|statsig
metrics_exporter = "none"              # none|statsig
trace_exporter = "none"                # none|statsig
log_user_prompt = false

