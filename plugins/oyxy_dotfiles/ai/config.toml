[memories]
use_memories = true
generate_memories = true
extract_model = "gpt-5.1-codex-mini"
consolidation_model = "gpt-5.4-mini"
#
# [windows]
# sandbox = "unelevated"              # elevated|unelevated
# sandbox_private_desktop = true

# =========================
# [features]
# =========================
[features]
multi_agent = false
apply_patch_freeform = true
apps = true
apps_mcp_gateway = true
artifact = true
child_agents_md = false
code_mode = true
# code_mode_only = false
# codex_git_commit = false
# codex_hooks = false
default_mode_request_user_input = true
# elevated_windows_sandbox = false
# enable_experimental_windows_sandbox = false
enable_fanout = false
enable_request_compression = true
# exec_permission_approvals = false
# experimental_windows_sandbox = false
fast_mode = true
# guardian_approval = false
# image_detail_original = false
# image_generation = false
js_repl = true
# js_repl_tools_only = false
memories = false
multi_agent_v2 = false
personality = true
plugins = true
prevent_idle_sleep = true
realtime_conversation = true
# request_permissions = false
# request_permissions_tool = false
runtime_metrics = true
shell_snapshot = true
shell_tool = true
# shell_zsh_fork = false
# skill_env_var_dependency_prompt = false
skill_mcp_dependency_install = true
# tool_call_mcp_elicitation = false
tool_search = true
tool_suggest = true
tui_app_server = true
undo = true
unified_exec = true
# use_legacy_landlock = false
# use_linux_sandbox_bwrap = false
voice_transcription = false

# =========================
# [notice]
# =========================
[notice]
# hide_full_access_warning = true
# hide_gpt-5.1-codex-max_migration_prompt = true
# hide_gpt5_1_migration_prompt = true
# hide_rate_limit_model_nudge = true
# hide_world_writable_warning = true

# =========================
# 动态分区
# =========================
# - [projects."<absolute_path>"]：trust_level = "trusted"|"untrusted"
# - [model_providers.<name>]：自定义 provider
# - [profiles.<name>]：命名配置组合
# - [plugins."<name>"]：插件启停
# - [permissions.<name>]：命名权限配置
# - [apps._default] / [apps."<app_id>"] / [apps."<app_id>".tools."<tool_name>"]
# - [skills.bundled] / [[skills.config]]

[model_providers.openai-http]
name = "OpenAI Compatible HTTP"
base_url = "https://oyxy.top:9443/v1"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
supports_websockets = false
requires_openai_auth = false

[profiles.cx1]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

[profiles.cx2]
model = "gpt-5.4"
model_reasoning_effort = "medium"

[profiles.cx3]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 800000

[profiles.cx4]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 800000
developer_instructions = """
When the deep-research skill is active, or when the user explicitly asks for deep research, comprehensive analysis, comparisons, trend analysis, sub-agents, delegation, or parallel work, treat that as authorization to use native multi-agent tools.
Prefer Codex-native coordination primitives: `spawn_agent`, `assign_task`, `send_message`, `wait_agent`, `list_agents`, and `close_agent`.
For independent research subtasks, prefer spawning 2-4 subagents in parallel with disjoint scopes and explicit output contracts.
Do not spawn subagents for simple lookups, tightly coupled blocking steps, or redundant work.
When subagents are running, continue non-overlapping synthesis locally and use `wait_agent` sparingly.
"""

[profiles.cx4.features]
multi_agent = true
multi_agent_v2 = true
enable_fanout = true
child_agents_md = true
